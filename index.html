<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── NATIVE CSS CURSOR USED INSTEAD OF JS ─── */

    /* ─── SCROLL REVEAL ─── */
    function useScrollReveal(ref, delay = 0) {
      useEffect(() => {
        const el = ref.current; if (!el) return;
        el.style.transitionDelay = `${delay}ms`;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el) }
        }, { threshold: .12 });
        obs.observe(el); return () => obs.disconnect();
      }, []);
    }
    const R = ({ children, d = 0, className = '' }) => {
      const r = useRef();
      useScrollReveal(r, d);
      return <div ref={r} className={`reveal ${className}`}>{children}</div>;
    };

    /* ─── SVGs ─── */
    const Svg = {
      download: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
      arrow: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
      mail: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M22 7l-10 7L2 7" /></svg>,
      linkedin: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z" /><rect x="2" y="9" width="4" height="12" /><circle cx="4" cy="4" r="2" /></svg>,
      check: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>,
      monitor: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" /></svg>,
      layout: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></svg>,
      phone: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" /><line x1="12" y1="18" x2="12.01" y2="18" strokeWidth="3" /></svg>,
      menu: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
      close: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
      behance: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 7h-7v-2h7v2zm1.726 10c-.442 1.297-2.029 3-5.101 3-3.074 0-5.564-1.729-5.564-5.675 0-3.91 2.325-5.92 5.466-5.92 3.082 0 4.964 1.782 5.375 4.426.078.506.109 1.188.095 2.14h-8.027c.13 3.211 3.483 3.312 4.588 2.029h3.168zm-7.686-4h4.965c-.105-1.546-1.436-2.35-2.461-2.35-.911 0-2.342.668-2.504 2.35zm-8.534-11v18h4.597c2.19 0 3.791-.259 4.887-1.427 1.09-1.162 1.32-2.825.438-4.184.898-1.077 1.242-2.735.088-3.978-1.127-1.22-2.613-1.411-4.757-1.411h-5.253zm3.5 11h1.492c1.078 0 2.213.253 2.213 1.5 0 1.258-1.196 1.5-2.213 1.5h-1.492v-3zm0-7h1.487c.725 0 1.947.23 1.947 1.341 0 1.242-1.354 1.298-2.115 1.298h-1.319v-2.639z" /></svg>,
      figma: <svg width="22" height="22" viewBox="0 0 38 57" fill="none"><path d="M19 28.5C19 33.7467 14.7467 38 9.5 38C4.25329 38 0 33.7467 0 28.5C0 23.2533 4.25329 19 9.5 19H19V28.5Z" fill="#0ACF83" /><path d="M0 47.5C0 52.7467 4.25329 57 9.5 57C14.7467 57 19 52.7467 19 47.5V38H9.5C4.25329 38 0 42.2533 0 47.5Z" fill="#A259FF" /><path d="M19 0H9.5C4.25329 0 0 4.2533 0 9.5C0 14.7467 4.25329 19 9.5 19H19V0Z" fill="#F24E1E" /><path d="M19 19H28.5C33.7467 19 38 14.7467 38 9.5C38 4.2533 33.7467 0 28.5 0H19V19Z" fill="#FF7262" /><path d="M38 28.5C38 33.7467 33.7467 38 28.5 38C23.2533 38 19 33.7467 19 28.5C19 23.2533 23.2533 19 28.5 19C33.7467 19 38 23.2533 38 28.5Z" fill="#1ABCFE" /></svg>,
      home: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
      user: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
      briefcase: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
    };

    /* ─── NAVBAR ─── */
    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [isOpen, setIsOpen] = useState(false);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
      }, []);

      useEffect(() => {
        if (isOpen) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
      }, [isOpen]);

      return (
        <>
          <nav className={scrolled ? 'scrolled' : ''}>
            <div className="nav-pill" style={{ zIndex: 100 }}>

              {/* Logo */}
              <div className="logo" style={{ zIndex: 101 }}>
                <div className="logo-icon">
                  <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5" /><line x1="12" y1="19" x2="20" y2="19" /></svg>
                </div>
                <span className="logo-text">Ahmed<span>.</span></span>
              </div>

              {/* Center links */}
              <div className="nav-links">
                {['Home', 'About', 'Projects', 'Services', 'Contact'].map(l => (
                  <a key={l} href={`#${l.toLowerCase()}`}>{l}</a>
                ))}
              </div>

              {/* CTA */}
              <div className="nav-cta" style={{ gap: '8px' }}>
                <a href="#contact" className="btn-ghost">Contact Us</a>
                <a href="https://drive.google.com/file/d/1k3TRKorcdcOmTokrB8KhXggVl-nMSKcr/view?usp=drive_link" target="_blank" className="btn-primary" style={{ textDecoration: 'none' }}>Open CV {Svg.arrow}</a>
              </div>

              {/* Mobile Toggle */}
              <button className="nav-toggle" style={{ zIndex: 101 }} onClick={() => setIsOpen(!isOpen)}>
                {isOpen ? Svg.close : Svg.menu}
              </button>

            </div>
          </nav>

          {/* Mobile Menu */}
          <div className={`mobile-menu ${isOpen ? 'open' : ''}`}>
            {['Home', 'About', 'Projects', 'Services', 'Contact'].map(l => (
              <a key={l} href={`#${l.toLowerCase()}`} className="m-link" onClick={() => setIsOpen(false)}>{l}</a>
            ))}
            <div className="mobile-menu-cta" style={{ width: '100%', padding: '0 24px' }}>
              <a href="https://drive.google.com/file/d/1k3TRKorcdcOmTokrB8KhXggVl-nMSKcr/view?usp=drive_link" target="_blank" className="btn-primary" style={{ textDecoration: 'none' }} onClick={() => setIsOpen(false)}>Open CV {Svg.arrow}</a>
              <a href="#contact" className="btn-ghost" style={{ display: 'inline-flex' }} onClick={() => setIsOpen(false)}>Contact Us</a>
            </div>
          </div>
        </>
      );
    };

    /* ─── TYPEWRITER ─── */
    const Typewriter = () => {
      const phrases = ["Turn your idea\ninto a digital product.", "Crafting\nUser-Centric Designs.", "Solving\nComplex Problems."];
      const [pi, setPi] = useState(0);
      const [txt, setTxt] = useState('');
      const [del, setDel] = useState(false);
      useEffect(() => {
        const p = phrases[pi];
        const t = setTimeout(() => {
          if (!del && txt === p) setTimeout(() => setDel(true), 2200);
          else if (del && txt === '') { setDel(false); setPi(i => (i + 1) % phrases.length) }
          else setTxt(p.substring(0, txt.length + (del ? -1 : 1)));
        }, del ? 20 : 50);
        return () => clearTimeout(t);
      }, [txt, del, pi]);
      return (
        <span className="tw-wrap">
          {txt.split('\n').map((line, i) => (
            <span key={i} style={{ display: 'block' }}>{line}{i === txt.split('\n').length - 1 && <span className="tw-cursor" />}</span>
          ))}
        </span>
      );
    };

    /* ─── HERO ─── */
    const Hero = () => {
      return (
        <section id="home">
          <div className="hero-bg"><div className="hero-line-grid" /></div>
          <div className="hero-inner">
            {/* ── LEFT: all content stacked, nothing moves ── */}
            <div className="hero-content">
              {/* Tag: always rendered, never animates position */}
              <div className="hero-tag">
                <div className="hero-tag-dot">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12" /></svg>
                </div>
                Available for work
              </div>

              {/* h1 has min-height reserved — only the text inside changes */}
              <h1 className="hero-h1"><Typewriter /></h1>

              {/* Sub copy — fixed position below h1 */}
              <p className="hero-sub">UI/UX Designer with 1.5+ years of experience. I build products that feel as good as they look — for PaaS, SaaS &amp; beyond.</p>

              {/* CTA buttons — same size as nav */}
              <div className="hero-actions" style={{ gap: '8px' }}>
                <a href="https://drive.google.com/file/d/1k3TRKorcdcOmTokrB8KhXggVl-nMSKcr/view?usp=drive_link" target="_blank" className="btn-primary" style={{ textDecoration: 'none' }}>Open CV {Svg.arrow}</a>
                <a href="#contact" className="btn-ghost">Contact Us</a>
              </div>
            </div>

            {/* ── RIGHT: image with floating cards ── */}
            <div className="hero-visual">
              <div className="hero-ring" />
              <div className="hero-img-wrap">
                {/* Floating Cards */}
                <div className="f-card f-card-l">
                  <span className="f-icon" style={{ width: 22, height: 22, display: 'flex' }}>{Svg.figma}</span>
                </div>
                <div className="f-card f-card-r">
                  UIUX Design
                </div>
                <a href="https://www.behance.net/ahmedmahmoud534478" target="_blank" className="f-card f-card-b" style={{ textDecoration: 'none' }}>
                  <span className="f-card-b-text">Go to case study</span>
                  {Svg.arrow}
                </a>

                <img
                  src="file2/Frame 147 (2).png"
                  alt="Ahmed — UI/UX Designer"
                  className="hero-img"
                />
              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ─── MARQUEE ─── */
    const Marquee = () => {
      const tools = [
        { src: 'file2/Canva_logo_PNG12.png', h: '35px' },
        { src: 'file2/Figma-Logo.png', h: '60px' },
        { src: 'file2/Miro-Logo.png', h: '60px' },
        { src: 'file2/Google_Meet_Logo_PNG5.png', h: '110px' },
        { src: 'file2/Jira_logo_PNG4.png', h: '60px' },
        { src: 'file2/Gemini-Logo.png', h: '60px' }
      ];
      const all = [...tools, ...tools, ...tools, ...tools, ...tools, ...tools];
      return (
        <div className="marquee-sec">
          <div className="marquee-track">
            {all.map((item, i) => (
              <div key={i} className="m-item" style={{ padding: '0 40px', flexShrink: 0 }}>
                <img
                  src={item.src}
                  alt="Tool"
                  style={{ height: item.h, width: 'auto', flexShrink: 0, objectFit: 'contain', cursor: 'pointer', transition: 'transform 0.3s' }}
                  onMouseEnter={(e) => { e.target.style.transform = 'scale(1.15)' }}
                  onMouseLeave={(e) => { e.target.style.transform = 'scale(1)' }}
                />
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ─── ABOUT ─── */
    const StatCard = ({ icon, num, label, suffix = '', isFloat = false }) => {
      const [val, setVal] = useState(0);
      const ref = useRef();
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) {
            let start = 0;
            const end = parseFloat(num);
            const steps = 30;
            const stepTime = 1500 / steps;
            let current = 0;
            const t = setInterval(() => {
              current++;
              setVal(start + (end - start) * (current / steps));
              if (current >= steps) { clearInterval(t); setVal(end); }
            }, stepTime);
            obs.disconnect();
          }
        });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [num]);

      return (
        <div className="stat-box" ref={ref}>
          <div className="stat-box-icon">{icon}</div>
          <div className="stat-box-num">
            {isFloat ? val.toFixed(1) : Math.floor(val)}{suffix}
          </div>
          <div className="stat-box-label">{label}</div>
        </div>
      );
    };

    const About = () => {
      const [messages, setMessages] = useState([]);
      const [showOptions, setShowOptions] = useState(false);
      const [isTyping, setIsTyping] = useState(false);
      const [hasStarted, setHasStarted] = useState(false);
      const [visibleOptions, setVisibleOptions] = useState([
        { id: 'q1', text: 'Introduce your self?' },
        { id: 'q2', text: 'What is the courses or training?' },
        { id: 'q3', text: 'How you can help me?' },
        { id: 'q4', text: 'Say another question' }
      ]);
      const secRef = useRef();

      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !hasStarted) {
            setHasStarted(true);
            setTimeout(() => {
              setIsTyping(true);
              setTimeout(() => {
                setIsTyping(false);
                setMessages([{ type: 'ahmed', content: <p>Hello! I'm Ahmed. What would you like to know about me?</p> }]);
                setTimeout(() => setShowOptions(true), 600);
              }, 1200);
            }, 300);
          }
        }, { threshold: .2 });
        if (secRef.current) obs.observe(secRef.current);
        return () => obs.disconnect();
      }, [hasStarted]);

      const handleOptionClick = (opt) => {
        setShowOptions(false);
        setVisibleOptions(prev => prev.filter(o => o.id !== opt.id));
        setMessages(prev => [...prev, { type: 'user', content: <p>{opt.text}</p> }]);

        setTimeout(() => {
          setIsTyping(true);
          setTimeout(() => {
            setIsTyping(false);
            let answer;
            switch (opt.id) {
              case 'q1':
                answer = <p>My name is ahmed, ui/ux designer have 1 and half year of experience. Collaborate with teams on PaaS, SaaS projects remotely and physically via varies platforms: Websites, Mobile apps, and Desktop apps from gathering user needs to handoff project, taking care about business goals. Apply Agile using scrum framework, and Water-fall Methodologies on part of projects. Have semi-knowledge on flutter development, work on 6 web development and Desktop Apps as ui/ux developer.</p>;
                break;
              case 'q2':
                answer = (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' }}>
                    <div className="training-card" style={{ display: 'flex', alignItems: 'center', gap: '16px', maxWidth: '100%', margin: 0, padding: '16px 20px' }}>
                      <div style={{ width: 44, height: 44, borderRadius: '12px', background: '#5b5bd615', color: '#5b5bd6', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></svg>
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', textAlign: 'left' }}>
                        <span style={{ fontSize: 16, fontWeight: 800, color: '#0a0a0f', letterSpacing: '-0.01em' }}>NTI Trainee</span>
                        <span style={{ fontSize: 13, fontWeight: 500, color: '#6b7280', marginTop: 4 }}>National Telecommunication Institute</span>
                      </div>
                    </div>
                    <div className="training-card" style={{ display: 'flex', alignItems: 'center', gap: '16px', maxWidth: '100%', margin: 0, padding: '16px 20px' }}>
                      <div style={{ width: 44, height: 44, borderRadius: '12px', background: '#5b5bd615', color: '#5b5bd6', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></svg>
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', textAlign: 'left' }}>
                        <span style={{ fontSize: 16, fontWeight: 800, color: '#0a0a0f', letterSpacing: '-0.01em' }}>ITI Trainee</span>
                        <span style={{ fontSize: 13, fontWeight: 500, color: '#6b7280', marginTop: 4 }}>Information Technology Institute</span>
                      </div>
                    </div>
                  </div>
                );
                break;
              case 'q3':
                answer = <p>Built projects in multiple fields: Health, Kids, E-Learning, Animals care, Personal portfolio, and Landing page. Today Try to apply “form follow function” design principle efficiently on projects.</p>;
                break;
              case 'q4':
                answer = (
                  <div className="contact-cards-sm">
                    <a href="mailto:ahmedmahmoud22990@gmail.com" className="c-card-sm">
                      <span className="c-icon-sm">{Svg.mail}</span> Gmail
                    </a>
                    <a href="#" className="c-card-sm">
                      <span className="c-icon-sm">{Svg.linkedin}</span> LinkedIn
                    </a>
                    <a href="#contact" className="c-card-sm">
                      <span className="c-icon-sm"><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" /></svg></span> Direct Message
                    </a>
                  </div>
                );
                break;
              default: answer = null;
            }
            setMessages(prev => [...prev, { type: 'ahmed', content: answer }]);
            setTimeout(() => setShowOptions(true), 800);
          }, 1500);
        }, 500);
      };

      return (
        <section id="about" ref={secRef}>
          <div className="about-wrap">
            <R>
              <div className="design-frame-wrap">
                <div className="design-frame">
                  <div className="df-node tl" /><div className="df-node tr" /><div className="df-node bl" /><div className="df-node br" />
                  <span>About Me</span>
                </div>
              </div>
            </R>
            <R d={100}>
              <div className="chat-window">
                <div className="chat-header">
                  <div className="chat-header-left">
                    <div className="chat-avatar-wrap">
                      <img src="file2/IMG_20230119_142120_copy_882x1174.jpg" alt="Ahmed Mahmoud" className="chat-avatar" />
                    </div>
                    <div className="chat-header-info">
                      <div className="chat-name">
                        Ahmed Mahmoud
                        <span className="online-dot"></span>
                      </div>
                      <div className="chat-title">UIUX Designer</div>
                    </div>
                  </div>
                  <a href="#contact" className="chat-header-msg" title="Send a message">
                    {Svg.mail}
                  </a>
                </div>
                <div className="chat-body">
                  {messages.map((msg, i) => (
                    <div key={i} className={`msg-row ${msg.type === 'ahmed' ? 'msg-ahmed' : 'msg-user'}`}>
                      <div className={`msg-bubble ${msg.type === 'ahmed' ? 'msg-from-ahmed' : 'msg-to-ahmed'}`}>
                        {msg.content}
                      </div>
                    </div>
                  ))}

                  {isTyping && (
                    <div className="msg-row msg-ahmed">
                      <div className="typing-indicator"><span></span><span></span><span></span></div>
                    </div>
                  )}

                  {showOptions && visibleOptions.length > 0 && (
                    <div className="chat-options" style={{ animation: 'fadeIn 0.4s ease forwards' }}>
                      {visibleOptions.map(opt => (
                        <button key={opt.id} className="chat-option-btn" onClick={() => handleOptionClick(opt)}>
                          {opt.text}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </R>
            <R d={200}>
              <div className="stats-grid">
                <StatCard icon={Svg.check} num={1.5} label="Years Experience" isFloat={true} />
                <StatCard icon={Svg.phone} num={5} label="Consultations" />
                <StatCard icon={Svg.monitor} num={4} label="Projects" suffix="+" />
              </div>
            </R>
          </div>
        </section>
      );
    };

    /* ─── PROJECTS ─── */
    const Projects = () => {
      const [showMore, setShowMore] = useState(false);
      const allWorks = [
        { title: 'Fe-Laffa Mobile App', desc: 'Is an Arabic Kids Care System work as an organizer for Parents to manage kids daily and monthly needs. Try to solve Obstacle of less knowledge about (1-3) years kid’s needs', bg: '#5b5bd615', tags: ['Kids Care System', 'SaaS'], reverse: false, date: 'May 2025', image: 'file2/إضافة عنوان (30).png', link: 'https://www.behance.net/gallery/226559701/_' },
        { title: 'Fix&Go Mobile App', desc: 'An Automotive Services App work as an assistant for vehicles keepers in Egypt. Try to solve Obstacle of fast roadside spare for 4 distinct types of vehicles: car, truck, bus, motorcycle on Emergencies breakdowns.', bg: '#a259ff12', tags: ['Automotive Services System', 'SaaS'], reverse: true, date: 'July 2025', image: 'file2/إضافة عنوان (31).png', link: 'https://www.behance.net/gallery/231685775/Fix-Go-mobile-app' },
        { title: 'Dalily Mobile App', desc: 'Is a Simple Arabic Map System App work as a guider for passengers over world. Was a challenge uiux app to design it with component and auto layout.', bg: '#5b5bd615', tags: ['saas', 'maps app'], reverse: false, date: 'August 2025', image: 'file2/cover (1).png' },
        { title: 'Truyou Landing Page', desc: 'Is a Mental Health Landing Page work as a guider for Arab Mental Patient to download Truyou mobile app, try to increase availability of app download link by applying 10 sections display the most important info about the app.', bg: '#a259ff12', tags: ['Mental Health', 'Landing Page'], reverse: true, date: 'January 2025', image: 'file2/إضافة عنوان (28).png', link: 'https://www.behance.net/gallery/229654349/Truyou-mental-health-landing-page-ui' }
      ];
      const works = showMore ? allWorks : allWorks.slice(0, 2);

      return (
        <section id="projects">
          <div className="projects-grid-bg"></div>
          <div className="projects-inner">
            <R>
              <div className="design-frame-wrap" style={{ textAlign: 'center', marginBottom: '48px', marginTop: 0 }}>
                <div className="design-frame" style={{ background: '#f5f4f0' }}>
                  <div className="df-node tl" /><div className="df-node tr" /><div className="df-node bl" /><div className="df-node br" />
                  <span>Projects</span>
                </div>
              </div>
            </R>
            <div className="proj-grid">
              {works.map((w, i) => (
                <R key={i} d={i * 100}>
                  <div className={`proj-card ${w.reverse ? 'reverse' : ''}`}>
                    <div className="proj-visual" style={{ background: w.bg, padding: w.image ? '0' : '40px' }}>
                      {w.image ? (
                        <img src={w.image} alt={w.title} style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '24px' }} />
                      ) : (
                        <div className="proj-mockup">
                          <div className="mockup-bar">
                            <div className="dot" style={{ background: '#f87171' }} /><div className="dot" style={{ background: '#fbbf24' }} /><div className="dot" style={{ background: '#4ade80' }} />
                          </div>
                          <div className="mockup-body">
                            <div className="mock-blk" style={{ height: '36px' }} />
                            <div className="mock-row">
                              <div className="mock-blk" style={{ height: '60px', flex: 1 }} />
                              <div className="mock-blk" style={{ height: '60px', flex: 2 }} />
                            </div>
                            <div className="mock-blk" style={{ height: '24px', width: '60%' }} />
                            <div className="mock-row">
                              <div className="mock-blk" style={{ height: '40px', flex: 1 }} />
                              <div className="mock-blk" style={{ height: '40px', flex: 1 }} />
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                    <div className="proj-info">
                      <div className="proj-num">{w.date}</div>
                      <h3 className="proj-title">{w.title}</h3>
                      <p className="proj-desc">{w.desc}</p>
                      <div className="proj-tags">{w.tags.map(t => <span key={t} className="tag">{t}</span>)}</div>
                      <div className="proj-btns">
                        {w.link ? (
                          <a href={w.link} target="_blank" className="pbtn pbtn-dark" style={{ textDecoration: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>View Project</a>
                        ) : (
                          <button className="pbtn pbtn-dark">View Project</button>
                        )}
                        <button className="pbtn pbtn-light">I want one like this</button>
                      </div>
                    </div>
                  </div>
                </R>
              ))}
            </div>
            <div className="view-more-wrapper" style={{ display: 'flex', justifyContent: 'center', marginTop: '48px' }}>
              {showMore ? (
                <a href="#contact" className="btn-ghost view-more-btn btn-pulse" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', textDecoration: 'none' }}>
                  Contact for new project
                </a>
              ) : (
                <button className="btn-ghost view-more-btn" onClick={() => setShowMore(true)} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  View more
                  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9" /></svg>
                </button>
              )}
            </div>
          </div>
        </section>
      );
    };

    /* ─── SERVICES ─── */
    const Services = () => {
      const [selectedService, setSelectedService] = useState(null);
      const [formData, setFormData] = useState({ name: '', email: '', desc: '' });
      const [showSuccess, setShowSuccess] = useState(false);

      const items = [
        { icon: Svg.monitor, title: 'Web Design', desc: 'Responsive, high-converting interfaces that elevate brands and engage users across every device.' },
        { icon: Svg.layout, title: 'Landing Pages Design', desc: 'Purpose-built landing pages that convert visitors into customers with clear hierarchy and persuasive design.' },
        { icon: Svg.phone, title: 'Mobile Apps Design', desc: 'Native-feel iOS and Android experiences designed around user behaviour, ensuring retention and delight.' },
      ];

      const handleSend = () => {
        if (!selectedService) return;
        const subject = encodeURIComponent(`New ${selectedService.title} Project`);
        const body = encodeURIComponent(`Name: ${formData.name}\nEmail: ${formData.email}\n\nProject Description:\n${formData.desc}`);
        window.location.href = `mailto:ahmedmahmoud22990@gmail.com?subject=${subject}&body=${body}`;
        
        setShowSuccess(true);
        setTimeout(() => {
          setShowSuccess(false);
          setSelectedService(null);
          setFormData({ name: '', email: '', desc: '' });
        }, 3000);
      };

      return (
        <section id="services">
          <div className="services-inner">
            <R>
              <div className="design-frame-wrap" style={{ textAlign: 'center', marginBottom: '48px', marginTop: 0 }}>
                <div className="design-frame" style={{ background: '#fff' }}>
                  <div className="df-node tl" /><div className="df-node tr" /><div className="df-node bl" /><div className="df-node br" />
                  <span>Services</span>
                </div>
              </div>
            </R>
            <div className="srv-grid">
              {items.map((s, i) => (
                <R key={i} d={i * 80}>
                  <div className="srv-card-wrap">
                    <div className="srv-card-inner">
                      <div className="srv-icon-wrap">{s.icon}</div>
                      <div className="srv-title">{s.title}</div>
                      <div className="srv-desc">{s.desc}</div>
                      <button className="btn-ghost srv-build-btn" onClick={() => setSelectedService(s)}>Build Project</button>
                    </div>
                  </div>
                </R>
              ))}
            </div>
          </div>

          {selectedService && (
            <div className="popup-overlay" onClick={() => setSelectedService(null)}>
              <div className="popup-content" onClick={e => e.stopPropagation()}>
                {showSuccess ? (
                  <div style={{ textAlign: 'center', padding: '40px 0', animation: 'fadeIn 0.3s' }}>
                    <div style={{ width: '64px', height: '64px', borderRadius: '50%', background: '#22c55e20', color: '#22c55e', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px' }}>
                      <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
                    </div>
                    <h3 style={{ fontSize: '24px', fontWeight: 800, marginBottom: '8px', color: '#0a0a0f' }}>Request Sent!</h3>
                    <p style={{ color: '#6b7280' }}>Opening your email client...</p>
                  </div>
                ) : (
                  <>
                    <h3 style={{ fontSize: '24px', fontWeight: 800, marginBottom: '24px', letterSpacing: '-0.02em', color: '#0a0a0f' }}>{selectedService.title}</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                      <input className="dark-input" style={{ border: '1px solid #e5e7eb' }} type="text" placeholder="Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                      <input className="dark-input" style={{ border: '1px solid #e5e7eb' }} type="email" placeholder="Email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                      <textarea className="dark-input" style={{ border: '1px solid #e5e7eb', minHeight: '120px', resize: 'vertical' }} placeholder="Project Description" value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})}></textarea>
                      <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
                        <button className="btn-primary" style={{ flex: 1, justifyContent: 'center' }} onClick={handleSend}>Send Request</button>
                        <button className="btn-ghost" style={{ padding: '0 24px' }} onClick={() => setSelectedService(null)}>Cancel</button>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </section>
      );
    };

    /* ─── CONTACT ─── */
    const Contact = () => {
      const [service, setService] = useState('');
      const [isDropdownOpen, setIsDropdownOpen] = useState(false);

      const serviceOptions = [
        { value: 'landing', label: 'Landing page design' },
        { value: 'website', label: 'Website design' },
        { value: 'mobile', label: 'Mobile application design' },
        { value: 'redesign', label: 'Redesign system' },
        { value: 'another', label: 'Another' }
      ];

      const selectedOption = serviceOptions.find(o => o.value === service);

      return (
        <section id="contact">
          <div className="contact-grid-bg"></div>
          <div className="contact-wrap" style={{ position: 'relative', zIndex: 1 }}>
            <R>
              <div className="design-frame-wrap" style={{ textAlign: 'center', marginBottom: '48px', marginTop: 0 }}>
                <div className="design-frame" style={{ background: '#f5f4f0' }}>
                  <div className="df-node tl" /><div className="df-node tr" /><div className="df-node bl" /><div className="df-node br" />
                  <span>Contact Us</span>
                </div>
              </div>
            </R>
            <div className="contact-top">
              <div>
                <R>
                  <div className="avail-pill">
                    <div className="avail-dot" />
                    Available for projects
                  </div>
                  <h2 className="contact-h2">Let's create something <em style={{ color: '#5b5bd6', fontStyle: 'normal' }}>remarkable.</em></h2>
                  <p className="contact-p">Have a product idea, a redesign challenge, or just want to say hello? I respond within 24 hours.</p>
                  <div className="cinfo-cards">
                    <a href="mailto:ahmed@example.com" className="cinfo-card">
                      <div className="cinfo-icon" style={{ color: '#9ca3af' }}>{Svg.mail}</div>
                      <div><div className="cinfo-tiny">Direct Email</div><div className="cinfo-val">ahmed@example.com</div></div>
                    </a>
                    <a href="#" className="cinfo-card">
                      <div className="cinfo-icon" style={{ color: '#9ca3af' }}>{Svg.linkedin}</div>
                      <div><div className="cinfo-tiny">LinkedIn</div><div className="cinfo-val">linkedin.com/in/ahmed</div></div>
                    </a>
                  </div>
                </R>
              </div>
              <R d={120}>
                <div className="dark-form">
                  <div className="dark-frow">
                    <div><label className="dark-label">Your Name</label><input className="dark-input" type="text" placeholder="John Doe" /></div>
                    <div><label className="dark-label">Email</label><input className="dark-input" type="email" placeholder="john@company.com" /></div>
                  </div>

                  <div style={{ marginBottom: '16px' }}>
                    <label className="dark-label">Select Service</label>
                    <div style={{ position: 'relative' }}>
                      <div
                        className="dark-input"
                        style={{ cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                        onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                      >
                        <span style={{ color: selectedOption ? '#0a0a0f' : '#9ca3af' }}>
                          {selectedOption ? selectedOption.label : 'Select a service...'}
                        </span>
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" style={{ transform: isDropdownOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s', color: '#6b7280' }}>
                          <polyline points="6 9 12 15 18 9" />
                        </svg>
                      </div>

                      {isDropdownOpen && (
                        <div style={{
                          position: 'absolute', top: '100%', left: 0, right: 0, marginTop: '8px',
                          background: 'white', border: '1px solid #e5e7eb', borderRadius: '12px',
                          boxShadow: '0 10px 30px rgba(0,0,0,0.08)', zIndex: 10, padding: '8px 0',
                          animation: 'fadeIn 0.2s ease'
                        }}>
                          {serviceOptions.map(o => (
                            <div
                              key={o.value}
                              style={{ padding: '12px 16px', cursor: 'pointer', fontSize: '14px', color: '#0a0a0f', transition: 'background 0.2s' }}
                              onMouseEnter={e => e.target.style.background = '#f4f6fb'}
                              onMouseLeave={e => e.target.style.background = 'transparent'}
                              onClick={() => { setService(o.value); setIsDropdownOpen(false); }}
                            >
                              {o.label}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {service === 'another' && (
                    <div style={{ marginBottom: '16px', animation: 'fadeIn 0.3s ease' }}>
                      <label className="dark-label">Specify Other Service</label>
                      <input className="dark-input" type="text" placeholder="Please specify..." />
                    </div>
                  )}

                  <div style={{ marginBottom: '24px' }}>
                    <label className="dark-label">What are you working on?</label>
                    <textarea className="dark-input" rows="5" placeholder="Describe your project or idea..." style={{ resize: 'none' }} />
                  </div>

                  <button className="dark-send">Send Message {Svg.arrow}</button>
                </div>
              </R>
            </div>
          </div>
        </section>
      );
    };

    /* ─── FOOTER ─── */
    const Footer = () => (
      <footer style={{ background: '#f5f4f0', padding: '40px 24px', borderTop: '1px solid #e5e7eb', textAlign: 'center' }}>
        <div className="footer-cta" style={{ display: 'flex', justifyContent: 'center', gap: '12px', marginBottom: '24px' }}>
          <a href="https://drive.google.com/file/d/1k3TRKorcdcOmTokrB8KhXggVl-nMSKcr/view?usp=drive_link" target="_blank" className="btn-primary" style={{ textDecoration: 'none' }}>Open CV {Svg.arrow}</a>
          <a href="#contact" className="btn-ghost" style={{ textDecoration: 'none' }}>Contact Us</a>
        </div>
        <p style={{ fontSize: '14px', color: '#6b7280', margin: '0' }}>© 2026 Ahmed. All rights reserved.</p>
      </footer>
    );

    /* ─── BOTTOM NAV ─── */
    const BottomNav = () => {
      const [active, setActive] = useState('home');
      
      const navItems = [
        { id: 'home', label: 'Home', icon: Svg.home },
        { id: 'about', label: 'About', icon: Svg.user },
        { id: 'projects', label: 'Work', icon: Svg.briefcase },
        { id: 'contact', label: 'Contact', icon: Svg.mail }
      ];

      return (
        <div className="bottom-nav">
          <div className="bottom-nav-inner">
            {navItems.map(item => (
              <a 
                key={item.id} 
                href={`#${item.id}`} 
                className={`b-nav-item ${active === item.id ? 'active' : ''}`}
                onClick={() => setActive(item.id)}
              >
                <div className="b-nav-icon">{item.icon}</div>
                <span>{item.label}</span>
              </a>
            ))}
          </div>
        </div>
      );
    };

    /* ─── APP ─── */
    const App = () => {
      return (
        <div>
          <Navbar />
          <Hero />
          <Marquee />
          <About />
          <Projects />
          <Services />
          <Contact />
          <Footer />
          <BottomNav />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
